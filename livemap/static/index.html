<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SANCHA1090 · Tokyo ADS-B Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="vendor/maplibre-gl.css" rel="stylesheet" />
<style>
  :root {
    --void: #05080c;
    --panel: rgba(7, 12, 18, 0.72);
    --hair: rgba(255, 176, 0, 0.18);
    --hair-soft: rgba(120, 160, 200, 0.12);
    --amber: #ffb000;
    --amber-dim: #c8924a;
    --ink: #e8eef5;
    --ink-dim: #7e93a8;
    --mil: #ff3b30;
    --grid: rgba(120, 170, 210, 0.05);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--void); overflow: hidden; }
  body {
    font-family: "Spline Sans Mono", ui-monospace, monospace;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  #map { position: fixed; inset: 0; }
  /* Cool the basemap a touch and let the warm HUD pop against it */
  #map .maplibregl-canvas { filter: saturate(0.85) brightness(0.92); }

  /* Atmosphere: vignette + faint scanlines over the whole stage */
  #stage::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(120% 90% at 50% 42%, transparent 55%, rgba(0,0,0,0.55) 100%);
  }
  #stage::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 5; opacity: 0.35;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.18) 2px 3px);
    mix-blend-mode: multiply;
  }

  .hud { position: fixed; z-index: 10; pointer-events: none; }
  .hud * { pointer-events: auto; }

  /* ── Masthead ─────────────────────────────────────────── */
  .masthead {
    top: 18px; left: 18px;
    border: 1px solid var(--hair);
    background: var(--panel);
    backdrop-filter: blur(9px) saturate(1.1);
    padding: 14px 18px 13px;
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 11px), calc(100% - 11px) 100%, 0 100%);
    box-shadow: 0 18px 40px -20px rgba(0,0,0,0.9), inset 0 0 0 1px rgba(255,255,255,0.02);
  }
  .masthead .kicker {
    font-family: "Chakra Petch", sans-serif;
    font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--amber-dim); margin: 0 0 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--mil);
    box-shadow: 0 0 0 0 rgba(255,59,48,0.7); animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,59,48,0.6); }
    70% { box-shadow: 0 0 0 7px rgba(255,59,48,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); }
  }
  /* Respect users who opt out of motion: drop the decorative pulse */
  @media (prefers-reduced-motion: reduce) {
    .live-dot { animation: none; }
  }
  .masthead h1 {
    font-family: "Chakra Petch", sans-serif;
    font-weight: 700; font-size: 25px; letter-spacing: 0.02em;
    margin: 0; line-height: 1; color: var(--ink);
  }
  .masthead h1 b { color: var(--amber); font-weight: 700; }
  .masthead .sub {
    margin-top: 7px; font-size: 10.5px; letter-spacing: 0.16em;
    color: var(--ink-dim); text-transform: uppercase;
  }

  /* ── Telemetry strip ──────────────────────────────────── */
  .telemetry {
    top: 18px; right: 18px; display: flex; gap: 10px;
  }
  .stat {
    border: 1px solid var(--hair-soft); background: var(--panel);
    backdrop-filter: blur(9px); padding: 11px 15px 9px; min-width: 92px;
    text-align: right;
    clip-path: polygon(11px 0, 100% 0, 100% 100%, 0 100%, 0 11px);
  }
  .stat .num {
    font-size: 27px; font-weight: 600; line-height: 1; color: var(--amber);
    font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
  }
  .stat.mil .num { color: var(--mil); }
  .stat .lbl {
    margin-top: 6px; font-size: 9px; letter-spacing: 0.24em;
    text-transform: uppercase; color: var(--ink-dim);
  }

  /* ── Legend / footer console ──────────────────────────── */
  .console {
    bottom: 18px; left: 18px;
    border: 1px solid var(--hair-soft); background: var(--panel);
    backdrop-filter: blur(9px); padding: 12px 16px;
    display: flex; flex-direction: column; gap: 9px;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 11px 100%, 0 calc(100% - 11px));
  }
  .legend-row { display: flex; gap: 16px; align-items: center; }
  .legend-row.fleet { gap: 11px; }
  .key { display: flex; align-items: center; gap: 7px; font-size: 10.5px; letter-spacing: 0.08em; color: var(--ink-dim); }
  .legend-row.fleet .key { gap: 5px; font-size: 9.5px; }
  .glyph { width: 11px; height: 11px; }
  .glyph.lg { width: 15px; height: 15px; }
  .glyph.amber { color: var(--amber); }
  .glyph.mil { color: var(--mil); filter: drop-shadow(0 0 4px rgba(255,59,48,0.8)); }
  .fade-bar {
    width: 86px; height: 7px; border-radius: 1px;
    background: linear-gradient(90deg, var(--amber), rgba(255,176,0,0.12));
  }
  .console .meta {
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--amber-dim); border-top: 1px solid var(--hair-soft); padding-top: 8px;
    display: flex; gap: 7px; align-items: center;
  }
  .console .meta .pip { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); }

  /* ── Tooltip ──────────────────────────────────────────── */
  .ac-tip {
    font-family: "Spline Sans Mono", monospace;
    background: rgba(5, 9, 14, 0.94) !important;
    border: 1px solid var(--hair) !important;
    color: var(--ink) !important;
    font-size: 11px !important; line-height: 1.5 !important;
    padding: 10px 12px !important; max-width: 240px;
    box-shadow: 0 14px 36px -16px rgba(0,0,0,0.95);
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%);
  }
  .ac-tip .flight {
    font-family: "Chakra Petch", sans-serif; font-weight: 700; font-size: 15px;
    letter-spacing: 0.04em; color: var(--amber); margin-bottom: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .ac-tip .flight.mil { color: var(--mil); }
  .ac-tip .badge {
    font-size: 8px; letter-spacing: 0.16em; padding: 2px 5px;
    border: 1px solid currentColor; border-radius: 1px; text-transform: uppercase;
  }
  .ac-tip .org { color: var(--ink-dim); margin-bottom: 7px; font-size: 10px; letter-spacing: 0.04em; }
  .ac-tip dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 2px 14px; }
  .ac-tip dt { color: var(--ink-dim); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; }
  .ac-tip dd { margin: 0; text-align: right; font-variant-numeric: tabular-nums; color: var(--ink); }

  @media (max-width: 620px) {
    .masthead h1 { font-size: 20px; }
    .telemetry { flex-direction: column; }
    .stat { min-width: 78px; }
  }
</style>
</head>
<body>
<div id="stage">
  <div id="map"></div>

  <div class="hud masthead">
    <p class="kicker"><span class="live-dot"></span>Live · ADS-B Mesh</p>
    <h1>SANCHA <b>1090</b></h1>
    <div class="sub">Real-time aircraft surveillance</div>
  </div>

  <div class="hud telemetry">
    <div class="stat"><div class="num" id="stat-total">—</div><div class="lbl">Tracked</div></div>
    <div class="stat mil"><div class="num" id="stat-mil">—</div><div class="lbl">Military</div></div>
  </div>

  <div class="hud console">
    <div class="legend-row">
      <span class="key"><svg class="glyph amber" viewBox="0 0 64 64"><use href="#sil-airliner"/></svg>Civil</span>
      <span class="key"><svg class="glyph mil" viewBox="0 0 64 64"><use href="#sil-airliner"/></svg>Military</span>
    </div>
    <div class="legend-row fleet">
      <span class="key"><svg class="glyph amber lg" viewBox="0 0 64 64"><use href="#sil-quad"/></svg>Quad</span>
      <span class="key"><svg class="glyph amber lg" viewBox="0 0 64 64"><use href="#sil-widebody"/></svg>Wide</span>
      <span class="key"><svg class="glyph amber lg" viewBox="0 0 64 64"><use href="#sil-airliner"/></svg>Narrow</span>
      <span class="key"><svg class="glyph amber lg" viewBox="0 0 64 64"><use href="#sil-regional"/></svg>Prop</span>
      <span class="key"><svg class="glyph amber lg" viewBox="0 0 64 64"><use href="#sil-ga"/></svg>GA</span>
      <span class="key"><svg class="glyph amber lg" viewBox="0 0 64 64"><use href="#sil-heli"/></svg>Heli</span>
    </div>
    <div class="legend-row">
      <span class="key">Fresh<span class="fade-bar"></span>60&nbsp;s</span>
    </div>
    <div class="meta"><span class="pip"></span><span id="meta-line">Connecting to stream…</span></div>
  </div>
</div>

<!-- North-pointing silhouettes — same shapes as map.js, reused by the fleet legend -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <g id="sil-airliner" fill="currentColor">
      <polygon points="32,3 35,10 34,24 60,39 60,43 34,31 33,48 39,52 39,55 32,52 25,55 25,52 31,48 30,31 4,43 4,39 30,24 29,10"/>
    </g>
    <g id="sil-widebody" fill="currentColor">
      <polygon points="32,3 37,12 36,23 61,38 61,43 36,31 35,48 42,53 42,56 32,53 22,56 22,53 29,48 28,31 3,43 3,38 28,23 27,12"/>
    </g>
    <g id="sil-quad" fill="currentColor">
      <polygon points="32,3 35,10 34,24 60,39 60,43 34,31 33,48 39,52 39,55 32,52 25,55 25,52 31,48 30,31 4,43 4,39 30,24 29,10"/>
      <ellipse cx="20" cy="33" rx="2.3" ry="3.6"/><ellipse cx="27" cy="30" rx="2.3" ry="3.6"/>
      <ellipse cx="44" cy="33" rx="2.3" ry="3.6"/><ellipse cx="37" cy="30" rx="2.3" ry="3.6"/>
    </g>
    <g id="sil-regional" fill="currentColor">
      <polygon points="32,7 34,13 33,24 55,30 55,33 33,28 32,48 37,52 37,54 32,51 27,54 27,52 31,48 31,28 9,33 9,30 31,24 30,13"/>
      <circle cx="16" cy="26" r="4" opacity="0.8"/><circle cx="48" cy="26" r="4" opacity="0.8"/>
    </g>
    <g id="sil-ga" fill="currentColor">
      <ellipse cx="32" cy="11" rx="9" ry="1.8" opacity="0.7"/>
      <rect x="30.4" y="10" width="3.2" height="42" rx="1.6"/>
      <rect x="7" y="25" width="50" height="3.6" rx="1.8"/>
      <rect x="22" y="46" width="20" height="3" rx="1.5"/>
    </g>
    <g id="sil-heli" fill="currentColor">
      <circle cx="32" cy="27" r="12" opacity="0.22"/>
      <rect x="30.5" y="27" width="3" height="28" rx="1.5"/><rect x="28" y="51" width="8" height="3" rx="1.5"/>
      <ellipse cx="32" cy="27" rx="5.5" ry="7.5"/>
      <rect x="9" y="25.5" width="46" height="3" rx="1.5" transform="rotate(35 32 27)"/>
      <rect x="9" y="25.5" width="46" height="3" rx="1.5" transform="rotate(-35 32 27)"/>
    </g>
  </defs>
</svg>

<script src="vendor/maplibre-gl.js"></script>
<script src="vendor/deck.gl.min.js"></script>
<script src="map.js"></script>
</body>
</html>
