name: 'sancha1090'
version: '1.0.0'
config-version: 2

profile: 'sancha1090'

test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]

target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  sancha1090:
    staging:
      +materialized: table
      +schema: silver
    silver:
      +materialized: table
      +schema: silver
    marts:
      +materialized: table
      +schema: gold

seeds:
  sancha1090:
    +schema: silver
    dim_hex_country:
      +tags: ['adsb']
      +column_types:
        block_lo: bigint
        block_hi: bigint
    dim_airlines:
      +tags: ['adsb']
    dim_airports:
      +tags: ['adsb']
      +column_types:
        lat: double
        lon: double

vars:
  legs_gap_min: 90        # new leg on a >90-min sample gap (lenient: keep long-haul whole where coverage allows)
  legs_snap_km: 100       # max airport snap distance from a low-altitude endpoint fix
  legs_cruise_alt_m: 3000 # below this an endpoint is a takeoff/landing; above it = overflight -> NULL endpoint
