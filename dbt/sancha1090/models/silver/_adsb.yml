version: 2

models:
  - name: dim_aircraft
    description: "Type-1 airframe dimension keyed by ICAO 24-bit hex; bronze-derived, registry-enriched (v5.1)"
    columns:
      - name: icao24
        description: "Lowercase ICAO 24-bit hex; one row per airframe"
        tests:
          - not_null
          - unique

  - name: int_adsb_callsign_from_opensky
    description: "Nearest OpenSky callsign per (hex, capture_ts) for ADS-B frames that decoded a position but no callsign; single-valued by row_number()=1 so the join into fct_adsb_state preserves rowcount"
    columns:
      - name: hex
        tests:
          - not_null

  - name: fct_adsb_state
    description: "Enriched ADS-B observations: dbFlags decode + airframe/airline/country dims, callsign OpenSky-backfilled (row-count preserving)"
    columns:
      - name: hex
        tests:
          - not_null
      - name: callsign_source
        description: "Provenance of callsign_filled: 'adsb' (native), 'opensky_backfill' (recovered), or NULL (no callsign anywhere)"
        tests:
          - accepted_values:
              arguments:
                values: ['adsb', 'opensky_backfill']

seeds:
  - name: dim_airlines
    description: "OpenFlights airlines keyed by ICAO 3-letter designator (type-1, active-wins)"
    columns:
      - name: icao
        tests:
          - not_null
          - unique

  - name: dim_hex_country
    description: "Disjoint ICAO 24-bit address blocks -> country (range lookup, specific-wins flattened)"
    columns:
      - name: country
        tests:
          - not_null

  - name: dim_airports
    description: "OurAirports airports keyed by ICAO 4-letter code (lat/lon for nearest-airport snapping); scheduled_service gates snap candidates for airline-shaped callsigns"
    columns:
      - name: icao
        tests:
          - not_null
          - unique
      - name: scheduled_service
        tests:
          - not_null
      - name: airport_type
        tests:
          - accepted_values:
              arguments:
                values: ['large_airport', 'medium_airport', 'small_airport', 'heliport', 'seaplane_base']
