version: 2

models:
  - name: int_jet_airframes
    description: "Jet-airliner airframes (lowercase icao24) for the SP4 runway feasibility gate; designator-first, body_class fallback, C130/C30J excluded."
    columns:
      - name: icao24
        tests:
          - not_null
          - unique

  - name: stg_vrs_routes
    description: "vradarserver standing-data schedules exploded into box-touching adjacent legs (one row per callsign_norm+origin+dest), endpoints dim_airports-confirmed; leg picked at attach; guarded empty until dim.dim_vrs_routes exists."
    columns:
      - name: callsign_norm
        tests:
          - not_null
