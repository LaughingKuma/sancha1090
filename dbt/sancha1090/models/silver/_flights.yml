version: 2

models:
  - name: dim_aircraft_registry
    description: "OpenSky aircraft registry (weekly CSV snapshots), latest as_of_date per airframe; country via ICAO24 block ranges"
    columns:
      - name: icao24
        description: "Lowercase ICAO 24-bit hex; one row per airframe"
        tests:
          - not_null
          - unique
  - name: stg_flight_segments_adsblol
    description: Global flight segments extracted from adsb.lol full traces (route backstory lane).
    columns:
      - name: icao24
        tests: [not_null]
      - name: seg_start_time
        tests: [not_null]
  - name: int_flight_routes_adsblol
    description: Airport-snapped segment endpoints; NULL endpoint = cruise or no airport within snap range.
    columns:
      - name: icao24
        tests: [not_null]
  - name: int_flight_chains_adsblol
    description: Coverage-gap segments chained into whole flights (cruise-plausible implied boundary speed); origin = first segment's snap, dest = last segment's.
    columns:
      - name: icao24
        tests: [not_null]
      - name: chain_start
        tests: [not_null]
  - name: int_flight_legs_opensky
    description: OpenSky-states O/D opinion (sessionize + pure sched-gated snap + callsign-split); a reconciler input. Duplicates fct_flight_legs's snap until SP2 dedups.
    columns:
      - name: icao24
        tests: [not_null]
      - name: start_time
        tests: [not_null]
      - name: end_time
        tests: [not_null]
  - name: int_flight_opinions
    description: Windowed O/D opinions from all sources in one common schema (source_rank 1=opensky_flights, 2=adsblol, 3=opensky_states); reconciler input.
    columns:
      - name: icao24
        tests: [not_null]
      - name: source
        tests:
          - accepted_values:
              arguments:
                values: ['opensky_flights', 'adsblol', 'opensky_states']
  - name: int_flight_spine
    description: One row per authority-ranked flight anchor; flight_id is the reconciliation key. Near-duplicate opensky_flights summaries can double-anchor a physical flight (~13% of the tier); dedup is SP2.
    columns:
      - name: flight_id
        tests: [not_null, unique]
  - name: int_flight_attach
    description: Each source opinion attached to its single best-overlap spine flight (callsign-guarded).
    columns:
      - name: flight_id
        tests: [not_null]
