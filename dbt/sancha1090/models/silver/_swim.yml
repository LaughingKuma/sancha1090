version: 2

models:
  - name: int_swim_flight
    description: "SWIM latest-amendment flight per flight_key, with density-scored callsign→icao24 (NULL when unresolved/ambiguous). Diagnostic kinds + hex_score/hex_ambiguous carried for int_swim_diagnostics."
    columns:
      - name: flight_key
        description: "coalesce(gufi, flight_ref, acid|computer_id|filed-departure-date) — one row each"
        tests: [not_null, unique]
  - name: int_swim_diagnostics
    description: "SWIM endpoint-kind distribution + hex match/ambiguity rates (visibility, not a vote input)."
  - name: int_swim_opinion
    description: "Rankless SWIM O/D opinion projection (source_rank stamped at the int_flight_opinions UNION); vote-eligible rows only (resolved non-ambiguous hex AND ≥1 non-null endpoint)."
    columns:
      - name: source
        tests:
          - accepted_values:
              arguments:
                values: ['swim']
