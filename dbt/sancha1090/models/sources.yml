version: 2

sources:
  - name: bronze
    description: "Bronze landing: the ClickHouse `bronze` database, loaded from the Garage S3 Parquet zone. dbt-clickhouse renders schema as the database and drops the catalog component."
    database: bronze
    schema: bronze
    tables:
      - name: opensky_states
        description: "Aircraft state vectors loaded from the Garage Parquet landing zone"
        columns:
          - name: icao24
            tests:
              - not_null
          - name: snapshot_time
            tests:
              - not_null
      - name: adsb_states
        description: "Byte-faithful readsb ADS-B state vectors; db_flags is the dbFlags integer baked at load (v6.3 dropped the verbatim _raw_json blob from CH — it lives in the source Garage/NAS Parquet)"
        columns:
          - name: hex
            tests:
              - not_null
      - name: opensky_flights
        description: "Flight summaries (arrivals/departures) for the tracked JP airports; a flight can surface in multiple capture windows — dedupe downstream"
        tags: ['flights']
        columns:
          - name: icao24
            tests:
              - not_null
          - name: first_seen
            tests:
              # bronze is raw/byte-faithful to the source Parquet — a few historical-backfill rows carry a null
              # first_seen; fact_flights filters them (where first_seen is not null), so warn, don't fail the raw layer.
              - not_null:
                  config:
                    severity: warn
      - name: aircraft_db
        description: "Weekly snapshots of OpenSky's aircraft registry CSV (identity/operator layer); latest as_of_date wins downstream"
        tags: ['flights']
        columns:
          - name: icao24
            tests:
              - not_null
      - name: adsblol_states
        description: "Backfilled pre-pipeline state snapshots (adsb.lol globe_history, ODbL); Japan-wide box, 12-min snapshot tier, provenance in `source`"
        tags: ['adsblol']
        columns:
          - name: icao24
            tests:
              - not_null
          - name: snapshot_time
            tests:
              - not_null
      - name: adsblol_flight_segments
        description: "Global flight segments from adsb.lol full traces (ODbL); overflight route backstory, RMT versioned on ingested_at"
        tags: ['adsblol']
        columns:
          - name: icao24
            tests:
              - not_null
          - name: seg_start
            tests:
              - not_null
      - name: adsblol_flight_paths
        description: "Full path points of the kept segments (ODbL, capture-only — no dbt consumer yet); RMT versioned on ingested_at"
        tags: ['adsblol']
        columns:
          - name: icao24
            tests:
              - not_null
          - name: ts
            tests:
              - not_null
      - name: swim_flightdata
        description: "FAA SWIM TFMData filed flight plans (SP3a landing lane); one row per fltdMessage."
        columns:
          - name: msg_timestamp
            description: "@sourceTimeStamp — the amendment version; on every message, used for argMax + ORDER BY."
            tests:
              - not_null

  - name: dim
    description: "Operator-loaded dimensions created by clickhouse-init (not dbt-managed): reference lists the marts read."
    database: dim
    schema: dim
    tables:
      - name: dim_ladd
        description: "FAA LADD privacy-list SCD2 intervals (SP3b); ReplacingMergeTree(_version) — read with FINAL. An open interval (valid_to NULL) is a currently-listed airframe; a closed interval protects data produced while it was listed. No source tests: they query the relation directly, but dim.dim_ladd is intentionally optional pre-deploy (the mart's deploy-order guard skips it when absent). Row validity/grain is enforced at the single writer (include/ladd.py: SCD2 plan keyed on registration, zero-valid-reg raise, mass-close guard)."
        columns:
          - name: registration
            description: "US N-number (normalized upper, N-prefixed) — the SCD2 identity key."
          - name: callsign
            description: "Normalized callsign (trim+upper) when the list carried one, else NULL; a second suppression-match key."
          - name: icao24
            description: "Resolved lowercase ICAO 24-bit hex (FAA registry first, N-number algorithm fallback); nullable by design — an unresolved N-number still suppresses by callsign."
          - name: valid_from
            description: "List date the interval opened (SCD2 valid-from); part of the RMT dedup key with registration."
          - name: valid_to
            description: "List date the interval closed, or NULL while the airframe is currently listed (open interval)."
      - name: dim_vrs_routes
        description: "vradarserver standing-data callsign→route table (SP4), daily pull via ingest_vrs_routes; ReplacingMergeTree(ingested_at) keyed callsign — read with FINAL. No source tests: optional pre-deploy (stg_vrs_routes's deploy-order guard emits empty until clickhouse-init creates it). AirportCodes is a '-'-joined ICAO hop list; parsing/validation lives in stg_vrs_routes."
        columns:
          - name: callsign
            description: "Route key as published (may be zero-padded vs transmitted callsigns; normalize with callsign_norm at match time)."
          - name: airport_codes
            description: "ICAO hop list, e.g. RJTT-RJFF; >2 hops = multi-stop (skipped by stg in v1)."
