version: 2

models:
  - name: fct_flights_reconciled
    description: "Cross-source consensus flight mart: per flight, O/D + callsign + boundaries agreed across OpenSky-flights, OpenSky-states-snap, adsb.lol-chain, with curated override; per-endpoint provenance."
    columns:
      - name: flight_id
        tests: [not_null, unique]
      - name: origin_source
        tests:
          - accepted_values:
              arguments:
                values: ['swim', 'vrs_routes', 'opensky_flights', 'opensky_states', 'adsblol', 'curated']
      - name: dest_source
        tests:
          - accepted_values:
              arguments:
                values: ['swim', 'vrs_routes', 'opensky_flights', 'opensky_states', 'adsblol', 'curated']
      - name: origin_agreement
        tests:
          - accepted_values:
              arguments:
                values: ['unanimous', 'majority', 'tiebreak', 'single', 'curated']
      - name: dest_agreement
        tests:
          - accepted_values:
              arguments:
                values: ['unanimous', 'majority', 'tiebreak', 'single', 'curated']
      - name: origin_name
        description: Resolved origin airport name (dim_airports); NULL when origin_icao is NULL.
      - name: origin_iata
        description: Origin IATA code (dim_airports, '' normalized to NULL); NULL when origin_icao is NULL or the airport has no IATA.
      - name: origin_city
        description: Origin city (dim_airports, '' normalized to NULL); NULL when origin_icao is NULL.
      - name: origin_lat
        description: Origin latitude (dim_airports); NULL when origin_icao is NULL.
      - name: origin_lon
        description: Origin longitude (dim_airports); NULL when origin_icao is NULL.
      - name: dest_name
        description: Resolved dest airport name (dim_airports); NULL when dest_icao is NULL.
      - name: dest_iata
        description: Dest IATA code (dim_airports, '' normalized to NULL); NULL when dest_icao is NULL or the airport has no IATA.
      - name: dest_city
        description: Dest city (dim_airports, '' normalized to NULL); NULL when dest_icao is NULL.
      - name: dest_lat
        description: Dest latitude (dim_airports); NULL when dest_icao is NULL.
      - name: dest_lon
        description: Dest longitude (dim_airports); NULL when dest_icao is NULL.
      - name: is_ladd
        description: "FAA LADD suppression flag (SP3b): 1 when the airframe's icao24 or normalized callsign matched a dim_ladd interval that was open or overlapped [start_time, end_time]. Flag only — the warehouse keeps the row; livemap drops is_ladd=1 at serve time. 0 until dim.dim_ladd is deployed (guarded literal)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
