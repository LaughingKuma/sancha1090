version: 2

models:
  - name: fct_flight_legs
    description: "Inferred flight legs from the OpenSky context feed: sessionized + altitude-gated airport snap (route_inferred is approximate, v5.2 reconciles)"
    columns:
      - name: icao24
        tests:
          - not_null

  - name: agg_route_traffic
    description: "Top inferred origin-dest routes (both endpoints resolved, origin != dest) for the deck.gl arc map"
    columns:
      - name: route_inferred
        tests:
          - not_null

  - name: agg_airline_traffic
    description: "Hourly distinct airframes by airline from the OpenSky context feed (callsign -> dim_airlines)"

  - name: agg_country_traffic_adsb
    description: "Rooftop ADS-B feed by registration country (mirror of the OpenSky context agg_country_traffic)"
    columns:
      - name: reg_country
        tests:
          - not_null
          - unique

  - name: fact_flights
    description: "Ground-truth flight narratives from OpenSky flight summaries, deduped to one row per (icao24, first_seen), registry-enriched"
    columns:
      - name: icao24
        tests:
          - not_null
      - name: first_seen
        tests:
          - not_null
      - name: direction
        tests:
          - accepted_values:
              arguments:
                values: ['arrival', 'departure']
      - name: window_kind
        tests:
          - accepted_values:
              arguments:
                values: ['d0', 'd2', 'backfill']

  - name: agg_flight_routes
    description: "Ground-truth top routes (both endpoints known, seen-in-context only) — counterpart to the inferred agg_route_traffic"
    columns:
      - name: route
        tests:
          - not_null
          - unique

  - name: agg_operator_traffic
    description: "Flights per operator (registry operator, dim_airlines fallback), seen-in-context only"
    columns:
      - name: operator_name
        tests:
          - not_null
          - unique

  - name: longest_flights
    description: "Top-10 longest-duration flights per day among seen-in-context aircraft"
    columns:
      - name: flight_day
        tests:
          - not_null
