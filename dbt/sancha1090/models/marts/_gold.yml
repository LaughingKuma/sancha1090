version: 2

models:
  - name: fct_flight_legs
    description: "Inferred flight legs from the OpenSky context feed: sessionized + altitude-gated airport snap (route_inferred is approximate, v5.2 reconciles)"
    columns:
      - name: icao24
        tests:
          - not_null

  - name: agg_route_traffic
    description: "Top inferred origin-dest routes (both endpoints resolved, origin != dest) for the deck.gl arc map"
    columns:
      - name: route_inferred
        tests:
          - not_null

  - name: agg_airline_traffic
    description: "Hourly distinct airframes by airline from the OpenSky context feed (callsign -> dim_airlines)"

  - name: agg_country_traffic_adsb
    description: "Rooftop ADS-B feed by registration country (mirror of the OpenSky context agg_country_traffic)"
    columns:
      - name: reg_country
        tests:
          - not_null
          - unique
