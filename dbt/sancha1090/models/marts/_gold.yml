version: 2

models:
  - name: fct_flight_legs
    description: "Inferred flight legs from the OpenSky context feed: sessionized + altitude-gated airport snap (route_inferred is approximate, v5.2 reconciles)"
    columns:
      - name: icao24
        tests:
          - not_null
      - name: route_source
        description: Leg-level provenance summary — 'snap' when a geometric airport snap resolved an endpoint, NULL otherwise. Per-endpoint truth is origin_source/dest_source. (adsblol/curated blend moved to fct_flights_reconciled in SP2.)
        tests:
          - accepted_values:
              arguments:
                values: ['snap']
      - name: origin_source
        description: Source that filled origin_icao — geometric snap only (SP2).
        tests:
          - accepted_values:
              arguments:
                values: ['snap']
      - name: dest_source
        description: Source that filled dest_icao — geometric snap only (SP2).
        tests:
          - accepted_values:
              arguments:
                values: ['snap']

  - name: agg_route_traffic
    description: "Top consensus origin→dest routes (both endpoints resolved, origin != dest) from fct_flights_reconciled — one mart replacing the SP1 inferred+authoritative split"
    columns:
      - name: route_inferred
        tests:
          - not_null

  - name: agg_airline_traffic
    description: "Hourly distinct airframes by airline from the OpenSky context feed (callsign -> dim_airlines)"

  - name: agg_country_traffic_adsb
    description: "Rooftop ADS-B feed by registration country (mirror of the OpenSky context agg_country_traffic)"
    columns:
      - name: reg_country
        tests:
          - not_null
          - unique

  - name: agg_airline_traffic_adsb
    description: "Rooftop ADS-B feed by operating airline (mirror of the OpenSky context agg_airline_traffic); attribution leans on the OpenSky callsign backfill, surfaced via backfilled_observations"
    columns:
      - name: airline_name
        tests:
          - not_null

  - name: fact_flights
    description: "Ground-truth flight narratives from OpenSky flight summaries, deduped to one row per (icao24, first_seen), registry-enriched"
    columns:
      - name: icao24
        tests:
          - not_null
      - name: first_seen
        tests:
          - not_null
      - name: direction
        tests:
          - accepted_values:
              arguments:
                values: ['arrival', 'departure']
      - name: window_kind
        tests:
          - accepted_values:
              arguments:
                values: ['d0', 'd2', 'backfill']

  - name: agg_operator_traffic
    description: "Flights per operator (registry operator, airline_name fallback) from fct_flights_reconciled"
    columns:
      - name: operator_name
        tests:
          - not_null
          - unique

  - name: longest_flights
    description: "Top-10 longest-duration reconciled flights per day, plausibility-filtered (resolved distinct endpoints, duration <= 24h)"
    columns:
      - name: flight_day
        tests:
          - not_null
