name: 'opensky'
version: '1.0.0'
config-version: 2

profile: 'opensky'

test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]

target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  opensky:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
