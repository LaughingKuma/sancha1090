name: 'opensky'
version: '1.0.0'
config-version: 2

profile: 'opensky'

test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]

target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  opensky:
    # Trino target lands silver/gold; postgres stays staging/marts so Superset
    # keeps reading analytics.marts.* until v2.7 re-points it.
    staging:
      +materialized: view
      +schema: "{{ 'silver' if target.type == 'trino' else 'staging' }}"
    silver:
      +materialized: table
      +schema: "{{ 'silver' if target.type == 'trino' else 'marts' }}"
    marts:
      +materialized: table
      +schema: "{{ 'gold' if target.type == 'trino' else 'marts' }}"
